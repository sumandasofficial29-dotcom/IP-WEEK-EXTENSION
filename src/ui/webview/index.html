<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="styles.css" rel="stylesheet">
  <title>Repo Prompt</title>
</head>
<body>
  <div class="container">
    <h2>Repo Intelligence</h2>
    <p>Generate context-aware prompts for your codebase.</p>
    
    <div class="input-group">
      <label for="promptInput">Your prompt:</label>
      <textarea id="promptInput" rows="4" placeholder="Describe what you want to do..."></textarea>
    </div>
    
    <button id="generateBtn" class="primary-btn">Generate Smart Prompt</button>
    
    <div id="output" class="output-section"></div>
  </div>
  
  <script src="main.js"></script>
</body>
</html>
